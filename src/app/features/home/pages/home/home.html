<section class="min-h-screen bg-zinc-950 text-white">
  <div class="mx-auto max-w-7xl px-6 py-10">

    <header class="mb-10">

      <p class="mb-2 text-sm font-semibold uppercase tracking-[0.3em] text-purple-400">
        GameVault
      </p>

      <h1 class="text-4xl font-bold md:text-6xl">
        Discover your next game
      </h1>

      <p class="mt-4 max-w-2xl text-zinc-400">
        Explore popular games, ratings, platforms and release dates using RAWG public API.
      </p>

    </header>

    <div *ngIf="isLoading" class="text-zinc-400">
      Loading games...
    </div>

    <div
      *ngIf="errorMessage"
      class="rounded-xl bg-red-500/10 p-4 text-red-300 mb-6"
    >
      {{ errorMessage }}
    </div>

    <div class="grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-4">

      <div
        *ngFor="let game of games"
        class="overflow-hidden rounded-2xl bg-zinc-900 shadow-lg transition duration-300 hover:-translate-y-1 hover:bg-zinc-800"
      >

        <img
          [src]="game.background_image"
          [alt]="game.name"
          class="h-52 w-full object-cover"
        />

        <div class="p-5">

          <h2 class="line-clamp-2 text-xl font-bold">
            {{ game.name }}
          </h2>

          <div class="mt-4 flex items-center justify-between text-sm text-zinc-400">

            <span>
              ⭐ {{ game.rating }}
            </span>

            <span>
              {{ game.released }}
            </span>

          </div>

          <div class="mt-4 flex flex-wrap gap-2">

            <span
              *ngFor="let platform of game.platforms.slice(0, 3)"
              class="rounded-full bg-zinc-800 px-3 py-1 text-xs text-zinc-300"
            >
              {{ platform.platform.name }}
            </span>

          </div>

        </div>

      </div>

    </div>

  </div>
</section>
