<section class="min-h-screen bg-zinc-950 text-white">
  <div class="mx-auto max-w-7xl px-6 py-10">
    <header class="mb-10">
      <p class="mb-2 text-sm font-semibold uppercase tracking-[0.3em] text-purple-400">GameVault</p>

      <h1 class="text-4xl font-bold md:text-6xl">Discover your next game</h1>

      <p class="mt-4 max-w-2xl text-zinc-400">
        Explore popular games, ratings, platforms and release dates using RAWG public API.
      </p>

      <div class="mt-8 flex max-w-2xl gap-3">
        <input
          type="text"
          name="search"
          [(ngModel)]="searchTerm"
          (ngModelChange)="onSearchChange()"
          placeholder="Search games..."
          class="w-full rounded-2xl border border-zinc-800 bg-zinc-900 px-5 py-4 text-white outline-none transition focus:border-purple-500"
        />

        <button
          type="button"
          class="rounded-2xl bg-purple-600 px-6 py-4 font-semibold text-white transition hover:bg-purple-500"
        >
          Search
        </button>
      </div>
    </header>

    <div *ngIf="errorMessage()" class="mb-6 rounded-xl bg-red-500/10 p-4 text-red-300">
      {{ errorMessage() }}
    </div>

    <div class="grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-4">
      <div
        *ngFor="let game of games()"
        [routerLink]="['/games', game.id]"
        queryParamsHandling="preserve"
        class="cursor-pointer overflow-hidden rounded-2xl bg-zinc-900 shadow-lg transition duration-300 hover:-translate-y-1 hover:bg-zinc-800 hover:shadow-purple-500/10"
      >
        <img [src]="game.background_image" [alt]="game.name" class="h-52 w-full object-cover" />

        <div class="p-5">
          <h2 class="line-clamp-2 text-xl font-bold">
            {{ game.name }}
          </h2>

          <div class="mt-4 flex items-center justify-between text-sm text-zinc-400">
            <span> ⭐ {{ game.rating }} </span>

            <span>
              {{ game.released }}
            </span>
          </div>

          <div class="mt-4 flex flex-wrap gap-2">
            <span
              *ngFor="let platform of (game.platforms || []).slice(0, 3)"
              class="rounded-full bg-zinc-800 px-3 py-1 text-xs text-zinc-300"
            >
              {{ platform.platform.name }}
            </span>
          </div>
        </div>
      </div>
    </div>
    <div class="mt-6 flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
      <div class="flex items-center gap-3">
        <label class="text-sm text-zinc-400"> Games per page </label>

        <select
          [ngModel]="pageSize()"
          (ngModelChange)="pageSize.set($event); onPageSizeChange()"
          class="rounded-xl border border-zinc-800 bg-zinc-900 px-4 py-2 text-white outline-none focus:border-purple-500"
        >
          <option [ngValue]="8">8</option>
          <option [ngValue]="12">12</option>
          <option [ngValue]="16">16</option>
          <option [ngValue]="20">20</option>
        </select>
      </div>

      <div class="flex items-center gap-3">
        <button
          type="button"
          (click)="goToPreviousPage()"
          [disabled]="currentPage() === 1"
          class="rounded-xl bg-zinc-900 px-4 py-2 text-sm text-zinc-300 transition hover:bg-zinc-800 disabled:cursor-not-allowed disabled:opacity-40"
        >
          Previous
        </button>

        <span class="text-sm text-zinc-400"> Page {{ currentPage() }} </span>

        <button
          type="button"
          (click)="goToNextPage()"
          [disabled]="!hasNextPage()"
          class="rounded-xl bg-zinc-900 px-4 py-2 text-sm text-zinc-300 transition hover:bg-zinc-800 disabled:cursor-not-allowed disabled:opacity-40"
        >
          Next
        </button>
      </div>
    </div>
  </div>
</section>
